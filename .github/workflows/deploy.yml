name: Deploy to GitHub Pages

# Dormant: we deploy via Vercel. Run this workflow manually from the Actions tab if you want to publish to GitHub Pages.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync database from Google Sheet
        env:
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          SPREADSHEET_ID: ${{ vars.SPREADSHEET_ID || '1kE0ogroOgXFBEH8y1qREU940ux41RUiLNE_rowXXAnQ' }}
        run: node scripts/sync-sheet-to-json.js

      - name: Sync events (Sheet + Luma)
        env:
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          SPREADSHEET_ID: ${{ vars.SPREADSHEET_ID || '1kE0ogroOgXFBEH8y1qREU940ux41RUiLNE_rowXXAnQ' }}
          LUMA_API_KEY: ${{ secrets.LUMA_API_KEY }}
        run: node scripts/sync-events.js

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
