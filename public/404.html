<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Foresight Map</title>
    <script>
      // SPA redirect: GitHub Pages serves 404.html for unknown routes.
      // We redirect to index.html with the original path so the client
      // router can handle it.
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(
        window.location.origin + path + search + hash
      );
    </script>
  </head>
  <body></body>
</html>
