<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Foresight Map</title>
    <script>
      // GitHub Pages serves this for unknown routes. Redirect to app root
      // and store the requested path so the SPA can restore it (deep links).
      (function () {
        var path = window.location.pathname;
        var segments = path.replace(/^\//, '').split('/');
        var baseSegment = segments[0] || '';
        var base = baseSegment ? '/' + baseSegment + '/' : '/';
        try {
          sessionStorage.setItem('foresightmap_redirect', path);
        } catch (e) {}
        window.location.replace(window.location.origin + base);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
